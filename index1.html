<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Question</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecb,#ffc9de);
overflow:hidden;
}

.container{
text-align:center;
padding:20px;
}

h1{
color:white;
font-size:2rem;
margin-bottom:25px;
}

select{
padding:10px;
border-radius:20px;
border:none;
margin-bottom:20px;
font-size:16px;
}

button{
padding:12px 28px;
font-size:18px;
border:none;
border-radius:30px;
margin:10px;
cursor:pointer;
transition:0.3s;
}

#yes{
background:#ff2e7a;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:white;
color:#ff2e7a;
position:absolute;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:30px;
border-radius:20px;
font-size:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.2);
display:none;
text-align:center;
max-width:300px;
}

.typing{
border-right:3px solid;
white-space:nowrap;
overflow:hidden;
}

.heart{
position:fixed;
font-size:20px;
animation:float 4s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-700px);
opacity:0;
}
}

.confetti{
position:fixed;
width:8px;
height:8px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10px) rotate(0);
}
100%{
transform:translateY(800px) rotate(360deg);
}
}

</style>
</head>

<body>

<div class="container">

<select id="mode">
<option value="wife">Wife 💍</option>
<option value="bestfriend">Best Friend 🤝</option>
<option value="sister">Little Sister 👧</option>
</select>

<h1 id="question">Do you love your wife?</h1>

<button id="yes">Yes</button>
<button id="no">No</button>

</div>

<div class="popup">
<div id="message" class="typing"></div>
</div>

<audio id="sound">
<source src="https://www.soundjay.com/buttons/sounds/button-3.mp3">
</audio>

<script>

const mode=document.getElementById("mode");
const question=document.getElementById("question");
const yes=document.getElementById("yes");
const no=document.getElementById("no");
const popup=document.querySelector(".popup");
const message=document.getElementById("message");
const sound=document.getElementById("sound");

const data={
wife:{
q:"Do you love your wife? 💍",
m:"I knew it! You really love your wife ❤️"
},
bestfriend:{
q:"Do you love your best friend? 🤝",
m:"True friendship never lies 💙"
},
sister:{
q:"Do you love your little sister? 👧",
m:"I knew it! You love your little sister ❤️"
}
};

mode.addEventListener("change",()=>{
let v=mode.value;
question.innerText=data[v].q;
});

no.addEventListener("mouseover",moveButton);
no.addEventListener("click",moveButton);

function moveButton(){

let x=Math.random()*(window.innerWidth-100);
let y=Math.random()*(window.innerHeight-50);

no.style.left=x+"px";
no.style.top=y+"px";
}

yes.addEventListener("click",()=>{

popup.style.display="block";
sound.play();

let v=mode.value;
typeText(data[v].m);

createHearts();
createConfetti();

document.body.style.background=
"linear-gradient(135deg,#ff4da6,#ff85c1)";

});

function typeText(text){

message.innerHTML="";
let i=0;

let interval=setInterval(()=>{

message.innerHTML+=text[i];
i++;

if(i>=text.length) clearInterval(interval);

},50);

}

function createHearts(){

setInterval(()=>{

let heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),4000);

},200);

}

function createConfetti(){

for(let i=0;i<120;i++){

let conf=document.createElement("div");
conf.classList.add("confetti");

conf.style.left=Math.random()*100+"vw";
conf.style.background=
"rgb("+Math.random()*255+","+
Math.random()*255+","+
Math.random()*255+")";

conf.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(conf);

setTimeout(()=>conf.remove(),5000);

}

}

</script>

</body>
</html>
